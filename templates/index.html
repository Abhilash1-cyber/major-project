<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetic Retinopathy Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --background: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .upload-area {
            border: 2px dashed var(--surface-border);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.4);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.1);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.8;
            fill: none;
            stroke: var(--primary);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #fileInput {
            display: none;
        }

        /* Image Display Grid */
        .image-results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 20px;
            display: none;
            /* hidden initially */
        }

        .image-results-grid.visible {
            display: grid;
        }

        .image-col {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }

        .image-badge {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #imagePreview,
        #heatmapPreview {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        /* Responsive Grid */
        @media (min-width: 768px) {
            .image-results-grid {
                grid-template-columns: 1fr 1fr;
            }

            .container {
                max-width: 800px;
            }
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s, transform 0.1s;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--text);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--surface-border);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .dr-positive {
            color: #f87171;
        }

        .dr-negative {
            color: #4ade80;
        }

        .confidence-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Retinopathy Detection & AI Analysis</h1>
        <p>Upload a retinal fundus image. The AI will provide a diagnosis and generate a Grad-CAM heatmap showing what
            influenced its decision.</p>

        <form id="uploadForm">

            <div class="image-results-grid" id="imageResultsGrid">
                <div class="image-col">
                    <div class="image-badge">Original Image</div>
                    <img id="imagePreview" src="" alt="Image Preview">
                </div>
                <div class="image-col" id="heatmapContainer" style="display:none;">
                    <div class="image-badge" style="background:#f43f5e;">AI Heatmap</div>
                    <img id="heatmapPreview" src="" alt="Heatmap Preview">
                </div>
            </div>

            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <svg class="upload-icon" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div id="uploadText">
                    <span style="font-weight:600; color: var(--text)">Click to upload</span> or drag and drop<br>
                    <span style="font-size:12px; color: var(--text-muted)">JPG, PNG (max 5MB)</span>
                </div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <button type="submit" class="btn" id="analyzeBtn" disabled>
                <span id="btnText">Analyze Image</span>
                <div class="loader" id="btnLoader"></div>
            </button>
        </form>

        <div id="result">
            <div class="result-label">Diagnosis</div>
            <div class="result-value" id="diagnosisValue">-</div>
            <div style="display:flex; justify-content: space-between; font-size: 14px;">
                <span class="result-label">Confidence</span>
                <span id="confidenceValue" style="font-weight:600">-</span>
            </div>
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceFill" style="width: 0%; background: var(--primary);"></div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const imagePreview = document.getElementById('imagePreview');
        const heatmapPreview = document.getElementById('heatmapPreview');
        const heatmapContainer = document.getElementById('heatmapContainer');
        const imageResultsGrid = document.getElementById('imageResultsGrid');
        const uploadForm = document.getElementById('uploadForm');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const resultDiv = document.getElementById('result');
        const diagnosisValue = document.getElementById('diagnosisValue');
        const confidenceValue = document.getElementById('confidenceValue');
        const confidenceFill = document.getElementById('confidenceFill');

        // Drag and drop handlers
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFiles(files[0]);
            }
        }

        fileInput.addEventListener('change', function () {
            if (this.files && this.files[0]) {
                handleFiles(this.files[0]);
            }
        });

        function handleFiles(file) {
            if (!file.type.match('image.*')) {
                alert('Please upload an image file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                imageResultsGrid.classList.add('visible'); // Show grid
                heatmapContainer.style.display = 'none'; // Hide heatmap initially
                dropZone.style.display = 'none';
                analyzeBtn.disabled = false;
                resultDiv.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }

        imagePreview.addEventListener('click', () => {
            fileInput.click();
        });

        uploadForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!fileInput.files || !fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // UI loading state
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            analyzeBtn.disabled = true;
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const responseText = await response.text();
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    console.error("Server Response:", responseText);
                    throw new Error(`The server did not return valid JSON. Are you running the Flask server and accessing http://127.0.0.1:5000/ instead of file://? Server said: ${responseText.substring(0, 100)}...`);
                }

                if (!response.ok) {
                    throw new Error(data.error || 'Something went wrong');
                }

                // Show results
                const isDR = data.prediction === 'DR';
                diagnosisValue.textContent = isDR ? "Diabetic Retinopathy Detected" : "No Diabetic Retinopathy";
                diagnosisValue.className = `result-value ${isDR ? 'dr-positive' : 'dr-negative'}`;

                const confidencePct = (data.confidence * 100).toFixed(2);
                confidenceValue.textContent = `${confidencePct}%`;

                confidenceFill.style.width = '0%';
                setTimeout(() => {
                    confidenceFill.style.width = `${data.confidence * 100}%`;
                    confidenceFill.style.backgroundColor = isDR ? '#f87171' : '#4ade80';
                }, 50);

                // Show Heatmap if returned
                if (data.heatmap) {
                    heatmapPreview.src = data.heatmap;
                    heatmapContainer.style.display = 'block';
                }

                resultDiv.style.display = 'block';

            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                // Restore button
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
